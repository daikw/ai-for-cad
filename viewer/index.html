<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ai-for-cad assembly viewer</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #2b323c; color: #dfe5ec; font: 13px/1.5 -apple-system, "Hiragino Sans", sans-serif; }
  #app { display: flex; height: 100%; }
  #panel { width: 248px; flex: none; overflow-y: auto; padding: 14px 16px; background: #232932; border-right: 1px solid #3a4350; }
  #view { flex: 1; position: relative; }
  canvas { display: block; }
  h1 { font-size: 14px; margin: 0 0 2px; }
  .sub { color: #8b97a4; font-size: 11px; margin-bottom: 14px; }
  #titlebar { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  #lang-toggle { font-size: 10px; padding: 1px 7px; flex: none; }
  #provenance { display: flex; flex-wrap: wrap; gap: 4px; margin: -8px 0 14px; }
  #provenance.hidden { display: none; }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 9px; border: 1px solid #3a4350; background: #2b323c; color: #9fb4c8; white-space: nowrap; }
  .badge.model { border-color: #4a6f96; color: #9cc3ea; }
  fieldset { border: 1px solid #3a4350; border-radius: 6px; margin: 0 0 12px; padding: 8px 10px; }
  legend { color: #9fb4c8; padding: 0 4px; font-size: 11px; letter-spacing: 0.06em; }
  label { display: flex; align-items: center; gap: 6px; padding: 2px 0; cursor: pointer; }
  label.part .sw { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  input[type="range"] { width: 100%; }
  select { width: 100%; background: #2b323c; color: inherit; border: 1px solid #3a4350; border-radius: 4px; padding: 4px; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 2px 0; }
  .val { color: #8b97a4; font-variant-numeric: tabular-nums; }
  #status { position: absolute; left: 10px; bottom: 8px; color: #8b97a4; font-size: 11px; pointer-events: none; max-width: calc(100% - 20px); }
  button { background: #2f3742; color: inherit; border: 1px solid #3a4350; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
  button:hover { background: #39434f; }
  fieldset.hidden { display: none; }
  label.part.hover { background: #2f3742; border-radius: 3px; }
  label.part .part-name.has-desc { text-decoration: underline dotted #55606e; text-underline-offset: 2px; }
  #tooltip { position: fixed; z-index: 10; max-width: 260px; padding: 6px 9px; background: #1c2129; border: 1px solid #4a5563; border-radius: 5px; font-size: 11px; color: #c9d4de; pointer-events: none; }
  #tooltip.hidden { display: none; }
</style>
<!-- three.js: exact-version pinned CDN imports (no install, no lockfile churn) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <div id="panel">
    <div id="titlebar">
      <h1>ai-for-cad viewer</h1>
      <button id="lang-toggle">EN</button>
    </div>
    <div class="sub" id="viewer-subtitle"></div>
    <div id="provenance" class="hidden"></div>

    <fieldset>
      <legend>PROJECT</legend>
      <select id="project-select"></select>
    </fieldset>

    <fieldset id="branch-fieldset">
      <legend>BRANCH</legend>
      <select id="branch-select"></select>
    </fieldset>

    <fieldset id="version-fieldset">
      <legend>VERSION</legend>
      <select id="version-select"></select>
    </fieldset>

    <fieldset id="scene-fieldset">
      <legend>SCENE</legend>
      <select id="scene-select"></select>
    </fieldset>

    <fieldset id="motion-fieldset" class="hidden">
      <legend>MOTION</legend>
      <select id="motion-select"></select>
      <div class="row" style="margin-top:6px"><button id="motion-play">▶ 再生</button></div>
    </fieldset>

    <fieldset>
      <legend>VIEW</legend>
      <div class="row"><span id="explode-label">分解表示</span><span class="val" id="explode-val">0</span></div>
      <input type="range" id="explode" min="0" max="100" value="0" />
      <div class="row"><span><span id="clip-label">断面クリップ</span> (<span id="clip-axis-label">Y</span>)</span><span class="val" id="clip-val">off</span></div>
      <input type="range" id="clip" min="0" max="100" value="0" />
      <label><input type="checkbox" id="ghosts" checked /> <span id="ghosts-label">ゴースト部品</span></label>
      <label><input type="checkbox" id="grid" checked /> <span id="grid-label">グリッド</span></label>
      <div class="row" style="margin-top:6px"><button id="reset-cam">カメラリセット</button></div>
    </fieldset>

    <fieldset>
      <legend>PARTS</legend>
      <div id="part-list"></div>
    </fieldset>
  </div>
  <div id="view"><div id="status">loading…</div></div>
</div>
<div id="tooltip" class="hidden"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";

THREE.Object3D.DEFAULT_UP = new THREE.Vector3(0, 0, 1); // CAD: Z-up

// ---- i18n -------------------------------------------------------------------
// UI chrome only; manifest content (titles, descriptions) stays as authored.
const I18N = {
  ja: {
    tips: "パーツにホバーで強調表示 / MOTION で機構を再生",
    explode: "分解表示", clip: "断面クリップ", ghosts: "ゴースト部品", grid: "グリッド",
    resetCam: "カメラリセット", play: "▶ 再生", stop: "■ 停止", reset: "↺ リセット",
    controls: "drag: orbit / wheel: zoom / 右drag: pan",
    loadError: (msg) => `読み込み失敗: ${msg} — viewer/serve.sh で HTTP 配信していますか？（file:// では STL/manifest を fetch できません）`,
  },
  en: {
    tips: "Hover a part to highlight it / play mechanisms via MOTION",
    explode: "Explode", clip: "Section clip", ghosts: "Ghost parts", grid: "Grid",
    resetCam: "Reset camera", play: "▶ Play", stop: "■ Stop", reset: "↺ Reset",
    controls: "drag: orbit / wheel: zoom / right-drag: pan",
    loadError: (msg) => `Load failed: ${msg} — is viewer/serve.sh serving over HTTP? (file:// cannot fetch STL/manifests)`,
  },
};
let lang = localStorage.getItem("viewer-lang") || (navigator.language?.startsWith("ja") ? "ja" : "en");

// ---- rotation helper -----------------------------------------------------
// Manifest "rot" is an ordered array of {axis, deg} world-frame steps, applied
// as quat = step_N * ... * step_2 * step_1 (each new step prepended in world
// space). This reproduces compound placements like the spherical-drone south
// apriltags: qz180.multiply(qx90) === buildQuat([{axis:"x",deg:90},{axis:"z",deg:180}]).
const AXIS_VEC = { x: new THREE.Vector3(1, 0, 0), y: new THREE.Vector3(0, 1, 0), z: new THREE.Vector3(0, 0, 1) };
function buildQuat(steps) {
  const q = new THREE.Quaternion();
  for (const step of steps || []) {
    q.premultiply(new THREE.Quaternion().setFromAxisAngle(AXIS_VEC[step.axis], (step.deg * Math.PI) / 180));
  }
  return q;
}

// ---- ghost primitive geometry ---------------------------------------------
// box()/cylinder() in ForgeCAD's own authoring API center X/Y but span Z as
// [0, size] (bottom-anchored); three.js geometries are centered on all 3 axes.
// Manifests store ghost "pos" as the three.js-centered position (already
// converted from ForgeCAD's bottom-anchored Z when the manifest was authored),
// so no further conversion happens here.
function buildGhostGeometry(g) {
  if (g.type === "box") return new THREE.BoxGeometry(...g.size);
  if (g.type === "sphere") return new THREE.SphereGeometry(g.r, 48, 32);
  if (g.type === "cylinder") {
    const segs = g.segments || 32;
    const geo = new THREE.CylinderGeometry(g.r, g.r, g.h, segs);
    // CylinderGeometry is Y-up by default; rotate its length axis to match
    // the manifest's requested world axis.
    if (g.axis === "z") geo.rotateX(Math.PI / 2);
    else if (g.axis === "x") geo.rotateZ(-Math.PI / 2);
    return geo;
  }
  throw new Error(`unknown ghost type: ${g.type}`);
}
function ghostMat(color, opacity = 0.4) {
  return new THREE.MeshStandardMaterial({ color, transparent: true, opacity, roughness: 0.6, depthWrite: false });
}

// ---- three.js scaffolding ---------------------------------------------------
const view = document.getElementById("view");
const status = document.getElementById("status");
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.localClippingEnabled = true;
view.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2b323c);
const camera = new THREE.PerspectiveCamera(40, 1, 1, 5000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xc7d3df, 0x495463, 0.9));
const key = new THREE.DirectionalLight(0xffe2bf, 1.6);
key.position.set(260, -320, 420);
scene.add(key);
const fill = new THREE.DirectionalLight(0xd4e6fb, 0.5);
fill.position.set(-260, 210, 220);
scene.add(fill);

const grid = new THREE.GridHelper(800, 40, 0x55606e, 0x3a4350);
grid.rotation.x = Math.PI / 2; // GridHelper is XZ; flip into the Z-up XY plane
scene.add(grid);

const clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 1e6);

const root = new THREE.Group();
scene.add(root);

// ---- STL cache (keyed by full URL so switching projects never collides) ---
const loader = new STLLoader();
const geoCache = new Map();
async function loadGeo(url) {
  if (!geoCache.has(url)) {
    geoCache.set(url, loader.loadAsync(url).then((g) => (g.computeVertexNormals(), g)));
  }
  return geoCache.get(url);
}

// ---- manifest-driven state ---------------------------------------------------
const partList = document.getElementById("part-list");
const sceneFieldset = document.getElementById("scene-fieldset");
const sceneSelect = document.getElementById("scene-select");
const projectSelect = document.getElementById("project-select");
const branchFieldset = document.getElementById("branch-fieldset");
const branchSelect = document.getElementById("branch-select");
const versionFieldset = document.getElementById("version-fieldset");
const versionSelect = document.getElementById("version-select");

let manifest = null;
let scenes = []; // resolved scene descriptors (synthesized if manifest has none)
let entries = []; // { name, object, basePos, explodeDir, ghost, color }
let currentBranches = []; // resolved { id, label, manifest } list for the active project
let currentBranch = null; // active branch entry (label is null for single-branch/flat projects)
let versions = []; // manifest.versions, or [] if the manifest declares none
let currentVersionId = null;

function resolveScenes(m) {
  if (Array.isArray(m.scenes) && m.scenes.length > 0) return m.scenes;
  // No scenes declared: one implicit scene showing every part + ghost,
  // ungrouped (groups undefined => no group filtering applied).
  return [{ id: "__all__", label: "assembly", camera: m.camera }];
}

async function loadManifest(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`manifest fetch failed: ${res.status} ${url}`);
  return res.json();
}

function populateSceneSelect() {
  sceneSelect.innerHTML = "";
  for (const s of scenes) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.label || s.id;
    sceneSelect.appendChild(opt);
  }
  const dflt = scenes.find((s) => s.default) || scenes[0];
  sceneSelect.value = dflt.id;
  sceneFieldset.classList.toggle("hidden", scenes.length <= 1);
}

// A project entry is either flat ({id,title,manifest}) or branched
// ({id,title,branches:[{id,label,manifest}]}). Both resolve to the same
// currentBranches shape so the rest of the app never special-cases branching.
function resolveBranches(entry) {
  if (Array.isArray(entry.branches) && entry.branches.length > 0) return entry.branches;
  return [{ id: "__flat__", label: null, manifest: entry.manifest }];
}

function populateBranchSelect() {
  branchSelect.innerHTML = "";
  for (const b of currentBranches) {
    const opt = document.createElement("option");
    opt.value = b.id;
    opt.textContent = b.label || b.id;
    branchSelect.appendChild(opt);
  }
  const dflt = currentBranches.find((b) => b.default) || currentBranches[0];
  branchSelect.value = dflt.id;
  branchFieldset.classList.toggle("hidden", currentBranches.length <= 1);
  return dflt;
}

function populateVersionSelect() {
  versionSelect.innerHTML = "";
  versions = Array.isArray(manifest.versions) ? manifest.versions : [];
  for (const v of versions) {
    const opt = document.createElement("option");
    opt.value = v.id;
    opt.textContent = v.id;
    versionSelect.appendChild(opt);
  }
  const dflt = versions.find((v) => v.default) || versions[0];
  currentVersionId = dflt ? dflt.id : null;
  if (dflt) versionSelect.value = dflt.id;
  versionFieldset.classList.toggle("hidden", versions.length <= 1);
}

// Per-part STL override for the active version, if any. Manifests without
// "versions" (or a version with no entry for this part) fall back to the
// part's own "stl", so buildScene needs no version-aware branch of its own.
function resolveStl(def) {
  const v = versions.find((v) => v.id === currentVersionId);
  return (v && v.stl && v.stl[def.id]) || def.stl;
}

function inGroup(entryGroup, groups) {
  if (!groups) return true; // scene has no group filter => show everything
  if (entryGroup == null) return true; // ungrouped entries are always shown
  return groups.includes(entryGroup);
}

async function buildScene(sceneId) {
  const sceneDef = scenes.find((s) => s.id === sceneId) || scenes[0];
  stopMotion(); // entries are about to be rebuilt
  root.clear();
  partList.innerHTML = "";
  entries = [];
  hoveredEntry = null; // old meshes are gone; don't restore materials on them
  hideTip();
  status.textContent = "loading…";

  const offsets = sceneDef.offsets || {};
  const lifts = sceneDef.explodeLift || {};

  for (const def of manifest.parts || []) {
    if (!inGroup(def.group, sceneDef.groups)) continue;
    const geo = await loadGeo(`${manifest.stlBase}/${resolveStl(def)}`);
    const mat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.62, metalness: 0.05, clippingPlanes: [clipPlane], side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.quaternion.copy(buildQuat(def.rot));

    const offset = offsets[def.group] || [0, 0, 0];
    const base = new THREE.Vector3(...(def.pos || [0, 0, 0])).add(new THREE.Vector3(...offset));
    mesh.position.copy(base);
    root.add(mesh);

    const dir = new THREE.Vector3(...(def.explode || [0, 0, 0]));
    const lift = lifts[def.group];
    if (lift) dir.add(new THREE.Vector3(...lift));

    entries.push({
      id: def.id, name: def.name, group: def.group ?? null,
      object: mesh, basePos: base, baseQuat: mesh.quaternion.clone(),
      sceneOffset: new THREE.Vector3(...offset), explodeDir: dir,
      ghost: false, color: def.color, baseColor: new THREE.Color(def.color),
      description: def.description ?? null, labelEl: null,
    });
  }

  for (const def of manifest.ghosts || []) {
    if (!inGroup(def.group, sceneDef.groups)) continue;
    const geo = buildGhostGeometry(def);
    const mesh = new THREE.Mesh(geo, ghostMat(def.color, def.opacity ?? 0.4));
    mesh.quaternion.copy(buildQuat(def.rot));

    const offset = offsets[def.group] || [0, 0, 0];
    const base = new THREE.Vector3(...(def.pos || [0, 0, 0])).add(new THREE.Vector3(...offset));
    mesh.position.copy(base);
    root.add(mesh);

    const dir = new THREE.Vector3(...(def.explode || [0, 0, 0]));
    const lift = lifts[def.group];
    if (lift) dir.add(new THREE.Vector3(...lift));

    entries.push({
      id: def.id || def.type, name: def.id || def.type, group: def.group ?? null,
      object: mesh, basePos: base, baseQuat: mesh.quaternion.clone(),
      sceneOffset: new THREE.Vector3(...offset), explodeDir: dir, ghost: true,
    });
  }

  // part list UI
  for (const e of entries) {
    if (e.ghost) continue;
    const label = document.createElement("label");
    label.className = "part";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;
    cb.addEventListener("change", () => (e.object.visible = cb.checked));
    const sw = document.createElement("span");
    sw.className = "sw";
    sw.style.background = e.color || "#888888";
    const nameEl = document.createElement("span");
    nameEl.className = "part-name" + (e.description ? " has-desc" : "");
    nameEl.textContent = e.name;
    label.append(cb, sw, nameEl);
    label.addEventListener("mouseenter", () => {
      setHighlight(e);
      if (e.description) {
        const r = label.getBoundingClientRect();
        showTip(e.description, r.right + 10, r.top);
      }
    });
    label.addEventListener("mouseleave", () => {
      setHighlight(null);
      hideTip();
    });
    e.labelEl = label;
    partList.appendChild(label);
  }

  applyExplode();
  applyGhostVisibility();
  fitCamera(sceneDef);
  const partCount = entries.filter((e) => !e.ghost).length;
  const tris = entries.filter((e) => !e.ghost).reduce((n, e) => n + (e.object.geometry?.attributes.position.count ?? 0) / 3, 0);
  // Mid segment surfaces whichever of branch/version/scene actually varies for
  // this project; single-branch, single-version, single-scene projects collapse
  // back to the plain "title / scene" status line from before branches/versions existed.
  const midParts = [];
  if (currentBranch?.label) midParts.push(currentBranch.label);
  if (versions.length > 1 && currentVersionId) midParts.push(currentVersionId);
  if (scenes.length > 1) midParts.push(sceneDef.label || sceneDef.id);
  const mid = midParts.length > 0 ? midParts.join(" / ") : (sceneDef.label || sceneDef.id);
  lastStatus = `${manifest.title} / ${mid} — ${partCount} parts, ${Math.round(tris).toLocaleString()} tris`;
  updateStatus();
}

let lastStatus = null;
function updateStatus() {
  if (lastStatus) status.textContent = `${lastStatus} — ${I18N[lang].controls}`;
}

function fitCamera(sceneDef) {
  const camDef = sceneDef.camera || manifest.camera || { target: [0, 0, 0], dist: 600 };
  const target = new THREE.Vector3(...camDef.target);
  const dist = camDef.dist;
  camera.position.set(target.x + dist * 0.62, target.y - dist * 0.72, target.z + dist * 0.42);
  controls.target.copy(target);
  controls.update();
}

// ---- hover highlight + description tooltip ---------------------------------
// Highlight = self-colored emissive on the target, dimmed base color on the
// rest. Material properties only — no mesh/material churn, no transparency
// (which would break depth sorting).
const tooltipEl = document.getElementById("tooltip");
let hoveredEntry = null;
function setHighlight(target) {
  if (target === hoveredEntry) return;
  hoveredEntry?.labelEl?.classList.remove("hover");
  hoveredEntry = target;
  target?.labelEl?.classList.add("hover");
  for (const e of entries) {
    if (e.ghost) continue; // ghost materials are transparent; leave them alone
    const mat = e.object.material;
    if (!target) {
      mat.color.copy(e.baseColor);
      mat.emissive.setHex(0x000000);
    } else if (e === target) {
      mat.color.copy(e.baseColor);
      mat.emissive.copy(e.baseColor).multiplyScalar(0.35);
    } else {
      mat.color.copy(e.baseColor).multiplyScalar(0.45);
      mat.emissive.setHex(0x000000);
    }
  }
}
function showTip(text, x, y) {
  tooltipEl.textContent = text;
  tooltipEl.style.left = `${x}px`;
  tooltipEl.style.top = `${y}px`;
  tooltipEl.classList.remove("hidden");
}
function hideTip() {
  tooltipEl.classList.add("hidden");
}

// 3D-side hover: pointermove only records coordinates; the render loop
// raycasts at most once per frame (dense STL meshes make per-event raycasts
// stutter). three.js early-outs on bounding spheres so a dozen parts is cheap;
// if a huge STL ever hurts, three-mesh-bvh is the escape hatch (new dependency).
const raycaster = new THREE.Raycaster();
const pointerNdc = new THREE.Vector2();
let pointerClient = { x: 0, y: 0 };
let pointerDirty = false;
let pointerDown = false;
renderer.domElement.addEventListener("pointermove", (ev) => {
  const r = renderer.domElement.getBoundingClientRect();
  pointerNdc.set(((ev.clientX - r.left) / r.width) * 2 - 1, -((ev.clientY - r.top) / r.height) * 2 + 1);
  pointerClient = { x: ev.clientX, y: ev.clientY };
  pointerDirty = true;
});
renderer.domElement.addEventListener("pointerdown", () => {
  pointerDown = true;
  hideTip();
});
addEventListener("pointerup", () => (pointerDown = false));
renderer.domElement.addEventListener("pointerleave", () => {
  setHighlight(null);
  hideTip();
});

function pickHover() {
  if (!pointerDirty || pointerDown) return;
  pointerDirty = false;
  raycaster.setFromCamera(pointerNdc, camera);
  const objs = entries.filter((e) => !e.ghost && e.object.visible).map((e) => e.object);
  const hit = raycaster.intersectObjects(objs, false)[0];
  const entry = hit ? entries.find((e) => e.object === hit.object) : null;
  setHighlight(entry);
  if (entry?.description) showTip(entry.description, pointerClient.x + 14, pointerClient.y + 14);
  else hideTip();
}

// ---- assembly motions -------------------------------------------------------
// manifest.motions[] = { id, label, loop, durationMs, easing, tracks: [{
//   part | group,                       // target: parts[].id / ghosts[].id or a group name
//   rotate:    { axis, degFrom, degTo, pivot? },  // pivot defaults to the part's basePos (spin in place)
//   orbit:     { axis, center, degFrom, degTo },  // revolve position around center; orientation untouched
//   translate: { from, to },
//   easing?,                            // per-track override
// }] }
// Poses are recomputed every frame from basePos/baseQuat (absolute, no drift).
// pivot/center are written in manifest coordinates (same frame as "pos");
// the per-entry scene offset is added at apply time.
const motionFieldset = document.getElementById("motion-fieldset");
const motionSelect = document.getElementById("motion-select");
const motionButton = document.getElementById("motion-play");
const EASING = {
  linear: (u) => u,
  easeIn: (u) => u * u * u,
  easeOut: (u) => 1 - (1 - u) ** 3,
  easeInOut: (u) => (u < 0.5 ? 4 * u ** 3 : 1 - (-2 * u + 2) ** 3 / 2),
};
let activeMotion = null; // { def, startTime } | null
let motionEnded = false; // a loop:false motion finished and holds its end pose
let savedExplodeValue = "0";

function populateMotionSelect() {
  motionSelect.innerHTML = "";
  const motions = Array.isArray(manifest.motions) ? manifest.motions : [];
  for (const m of motions) {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.label || m.id;
    motionSelect.appendChild(opt);
  }
  motionFieldset.classList.toggle("hidden", motions.length === 0);
}

function resolveTargets(track) {
  if (track.part) return entries.filter((e) => e.id === track.part);
  if (track.group) return entries.filter((e) => e.group === track.group);
  return [];
}

function startMotion(def) {
  // Pivots/centers are authored for the assembled state — exploding while a
  // motion runs would revolve parts around the wrong axes, so park explode.
  savedExplodeValue = explodeInput.value;
  explodeInput.value = "0";
  applyExplode();
  explodeInput.disabled = true;
  for (const track of def.tracks || []) {
    if (resolveTargets(track).length === 0) console.warn(`motion "${def.id}": no entry matches`, track);
  }
  activeMotion = { def, startTime: null };
  motionEnded = false;
  motionButton.textContent = I18N[lang].stop;
}

function stopMotion() {
  if (!activeMotion && !motionEnded) return;
  activeMotion = null;
  motionEnded = false;
  explodeInput.disabled = false;
  explodeInput.value = savedExplodeValue;
  applyExplode(); // restores positions; orientations restored below
  for (const e of entries) e.object.quaternion.copy(e.baseQuat);
  motionButton.textContent = I18N[lang].play;
}

function applyMotion(time) {
  const m = activeMotion.def;
  if (activeMotion.startTime === null) activeMotion.startTime = time;
  let u = (time - activeMotion.startTime) / (m.durationMs || 3000);
  let done = false;
  if (m.loop) u %= 1;
  else if (u >= 1) ((u = 1), (done = true));

  for (const track of m.tracks || []) {
    const v = (EASING[track.easing || m.easing] || EASING.linear)(u);
    for (const e of resolveTargets(track)) {
      const pos = e.basePos.clone();
      const quat = e.baseQuat.clone();
      if (track.rotate) {
        const r = track.rotate;
        const ang = THREE.MathUtils.degToRad(r.degFrom + (r.degTo - r.degFrom) * v);
        const q = new THREE.Quaternion().setFromAxisAngle(AXIS_VEC[r.axis], ang);
        const pivot = r.pivot ? new THREE.Vector3(...r.pivot).add(e.sceneOffset) : e.basePos;
        pos.sub(pivot).applyQuaternion(q).add(pivot);
        quat.premultiply(q); // same world-frame convention as buildQuat
      }
      if (track.orbit) {
        const o = track.orbit;
        const ang = THREE.MathUtils.degToRad(o.degFrom + (o.degTo - o.degFrom) * v);
        const q = new THREE.Quaternion().setFromAxisAngle(AXIS_VEC[o.axis], ang);
        const center = new THREE.Vector3(...o.center).add(e.sceneOffset);
        pos.sub(center).applyQuaternion(q).add(center); // position only
      }
      if (track.translate) {
        pos.add(new THREE.Vector3().lerpVectors(new THREE.Vector3(...track.translate.from), new THREE.Vector3(...track.translate.to), v));
      }
      e.object.position.copy(pos);
      e.object.quaternion.copy(quat);
    }
  }
  if (done) {
    // Hold the end pose (explode stays parked); the button turns into a reset.
    activeMotion = null;
    motionEnded = true;
    motionButton.textContent = I18N[lang].reset;
  }
}

motionButton.addEventListener("click", () => {
  if (activeMotion || motionEnded) {
    stopMotion();
    return;
  }
  const motions = Array.isArray(manifest.motions) ? manifest.motions : [];
  const def = motions.find((m) => m.id === motionSelect.value);
  if (def) startMotion(def);
});
motionSelect.addEventListener("change", stopMotion);

// ---- UI wiring ---------------------------------------------------------------
const explodeInput = document.getElementById("explode");
function applyExplode() {
  const k = Number(explodeInput.value); // 0..100
  document.getElementById("explode-val").textContent = k;
  for (const e of entries) {
    e.object.position.copy(e.basePos).addScaledVector(e.explodeDir, k * 1.1);
  }
}
explodeInput.addEventListener("input", applyExplode);

const AXIS_UNIT = { x: new THREE.Vector3(-1, 0, 0), y: new THREE.Vector3(0, -1, 0), z: new THREE.Vector3(0, 0, -1) };
const clipInput = document.getElementById("clip");
function applyClip() {
  const clipCfg = manifest?.clip || { axis: "y", min: -100, max: 100 };
  document.getElementById("clip-axis-label").textContent = clipCfg.axis.toUpperCase();
  clipPlane.normal.copy(AXIS_UNIT[clipCfg.axis]);
  const k = Number(clipInput.value);
  if (k === 0) {
    clipPlane.constant = 1e6;
    document.getElementById("clip-val").textContent = "off";
  } else {
    clipPlane.constant = clipCfg.max - (k / 100) * (clipCfg.max - clipCfg.min);
    document.getElementById("clip-val").textContent = `${clipCfg.axis}=${clipPlane.constant.toFixed(0)}`;
  }
}
clipInput.addEventListener("input", applyClip);

const ghostsInput = document.getElementById("ghosts");
function applyGhostVisibility() {
  for (const e of entries) if (e.ghost) e.object.visible = ghostsInput.checked;
}
ghostsInput.addEventListener("change", applyGhostVisibility);

document.getElementById("grid").addEventListener("change", (ev) => (grid.visible = ev.target.checked));
sceneSelect.addEventListener("change", () => buildScene(sceneSelect.value).catch(reportError));
document.getElementById("reset-cam").addEventListener("click", () => {
  const sceneDef = scenes.find((s) => s.id === sceneSelect.value) || scenes[0];
  fitCamera(sceneDef);
});

// ---- provenance badges ------------------------------------------------------
// manifest.provenance = { aiModel, skills: [...], dsl, date } — all optional.
const provenanceEl = document.getElementById("provenance");
function renderProvenance(p) {
  provenanceEl.innerHTML = "";
  const badges = [];
  if (p?.aiModel) badges.push({ text: p.aiModel, cls: "model" });
  if (p?.dsl) badges.push({ text: `dsl: ${p.dsl}` });
  for (const s of p?.skills || []) badges.push({ text: s });
  if (p?.date) badges.push({ text: p.date });
  for (const b of badges) {
    const span = document.createElement("span");
    span.className = b.cls ? `badge ${b.cls}` : "badge";
    span.textContent = b.text;
    provenanceEl.appendChild(span);
  }
  provenanceEl.classList.toggle("hidden", badges.length === 0);
}

function reportError(err) {
  status.textContent = I18N[lang].loadError(err.message);
  console.error(err);
}

// ---- language toggle --------------------------------------------------------
function applyLang() {
  const s = I18N[lang];
  document.getElementById("lang-toggle").textContent = lang === "ja" ? "EN" : "JA";
  document.getElementById("viewer-subtitle").textContent = s.tips;
  document.getElementById("explode-label").textContent = s.explode;
  document.getElementById("clip-label").textContent = s.clip;
  document.getElementById("ghosts-label").textContent = s.ghosts;
  document.getElementById("grid-label").textContent = s.grid;
  document.getElementById("reset-cam").textContent = s.resetCam;
  motionButton.textContent = activeMotion ? s.stop : motionEnded ? s.reset : s.play;
  updateStatus();
}
document.getElementById("lang-toggle").addEventListener("click", () => {
  lang = lang === "ja" ? "en" : "ja";
  localStorage.setItem("viewer-lang", lang);
  applyLang();
});

// ---- project / branch / version switching --------------------------------
let projects = [];

async function selectBranch(branchEntry) {
  try {
    currentBranch = branchEntry;
    manifest = await loadManifest(branchEntry.manifest);
    renderProvenance(manifest.provenance);
    populateVersionSelect();
    scenes = resolveScenes(manifest);
    populateSceneSelect();
    populateMotionSelect();
    applyClip();
    await buildScene(sceneSelect.value);
  } catch (err) {
    reportError(err);
  }
}

async function selectProject(entry) {
  currentBranches = resolveBranches(entry);
  const dflt = populateBranchSelect();
  await selectBranch(dflt);
}

async function init() {
  const res = await fetch("./projects.json");
  if (!res.ok) throw new Error(`projects.json fetch failed: ${res.status}`);
  ({ projects } = await res.json());
  for (const p of projects) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.title;
    projectSelect.appendChild(opt);
  }
  projectSelect.addEventListener("change", () => {
    const entry = projects.find((p) => p.id === projectSelect.value);
    selectProject(entry);
  });
  branchSelect.addEventListener("change", () => {
    const b = currentBranches.find((b) => b.id === branchSelect.value);
    selectBranch(b).catch(reportError);
  });
  versionSelect.addEventListener("change", () => {
    currentVersionId = versionSelect.value;
    buildScene(sceneSelect.value).catch(reportError);
  });
  await selectProject(projects[0]);
}

function resize() {
  const w = view.clientWidth;
  const h = view.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener("resize", resize);
resize();

renderer.setAnimationLoop((time) => {
  if (activeMotion) applyMotion(time);
  pickHover();
  controls.update();
  renderer.render(scene, camera);
});

applyLang();
init().catch(reportError);
</script>
</body>
</html>
